name: Ultimate-Direct-Stream-Final
on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Tools & Localtonet
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg curl python3 unzip
          # تحميل الأداة بسرعة
          curl -L https://localtonet.com/download/localtonet-linux-x64.zip -o lt.zip
          unzip lt.zip
          chmod +x localtonet

      - name: Launch Stream & Tunnel
        env:
          LT_TOKEN: ${{ secrets.LOCALTONET_TOKEN }}
        run: |
          # تفعيل التوكن أولاً بشكل منفصل (حل مشكلة Wrong Token)
          ./localtonet authtoken $LT_TOKEN
          
          # تشغيل النفق على المنفذ 8080 في الخلفية
          ./localtonet http -p 8080 &
          
          # انتظار بسيط لربط السيرفر
          sleep 15
          
          # تجهيز مجلد البث وسيرفر الويب
          mkdir -p live
          cd live
          python3 -m http.server 8080 &
          
          # أمر البث الاحترافي (نظام 28 ثانية - تأخير 0)
          ffmpeg -re -i "http://webplayerx.org:8080/bn1hd/index.m3u8" \
            -c copy \
            -f hls \
            -hls_time 2 \
            -hls_list_size 14 \
            -hls_flags delete_segments+append_list+discont_start \
            index.m3u8

