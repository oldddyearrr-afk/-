name: Nginx-Ultra-Stream
on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install Nginx & FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx ffmpeg curl
          # تثبيت Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok

      - name: Configure Nginx & Permissions
        run: |
          sudo bash -c 'cat <<EOF > /etc/nginx/sites-available/default
          server {
              listen 80;
              location / {
                  root /var/www/html/live;
                  add_header Access-Control-Allow-Origin *;
                  add_header Cache-Control no-cache;
                  types {
                      application/vnd.apple.mpegurl m3u8;
                      video/mp2t ts;
                  }
              }
          }
          EOF'
          sudo mkdir -p /var/www/html/live
          sudo chmod -R 777 /var/www/html/live
          sudo systemctl restart nginx

      - name: Start Ngrok & FFmpeg
        env:
          NGROK_AUTH: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          ngrok config add-authtoken $NGROK_AUTH
          ngrok http 80 --log=stdout &
          sleep 10
          # البث بنظام 28 ثانية (ثانيتان للقطعة)
          ffmpeg -re -i "http://veltrixa.life:8080/bn1hevc/index.m3u8" \
            -c copy \
            -f hls \
            -hls_time 2 \
            -hls_list_size 14 \
            -hls_flags delete_segments+append_list+discont_start \
            /var/www/html/live/index.m3u8
