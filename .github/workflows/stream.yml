name: Serveo-Direct-Stream
on:
  workflow_dispatch:

jobs:
  run-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg & Python
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg python3

      - name: Start Stream & Get Link
        run: |
          # 1. إنشاء مجلد البث وتشغيل سيرفر ويب خفيف
          mkdir -p live
          cd live
          python3 -m http.server 8080 &
          
          # 2. تشغيل نفق Serveo والحصول على الرابط
          # سنقوم بفتح اتصال SSH ليعطينا الرابط ويحفظه في ملف
          ssh -o StrictHostKeyChecking=no -R 80:localhost:8080 serveo.net > link.txt 2>&1 &
          
          echo "جاري استخراج رابط البث المباشر..."
          sleep 10
          
          # 3. استخراج الرابط من الملف وطباعته
          SERVER_URL=$(grep -o 'https://[^ ]*' link.txt | head -1)
          echo "----------------------------------------------------"
          echo "✅ تم تشغيل السيرفر بنجاح"
          echo "رابط البث الخاص بك هو:"
          echo "$SERVER_URL/index.m3u8"
          echo "----------------------------------------------------"
          
          # 4. تشغيل FFmpeg لسحب البث وتحويله
          ffmpeg -re -i "http://webplayerx.org:8080/bn1hd/index.m3u8" \
            -c copy \
            -f hls \
            -hls_time 2 \
            -hls_list_size 14 \
            -hls_flags delete_segments+append_list+discont_start \
            index.m3u8
